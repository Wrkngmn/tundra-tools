name: Fetch Snow Data

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - # No external dependencies needed for fetch_snow_data.py
requests

      - name: Install dependencies
        run: pip install requests

      - name: Run snow data fetch script
        run: python scripts/fetch_snow_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snow_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update snow data - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
